    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header class="header">
        <div class="logo-box">
            <img src="images/logo.png.png" alt="春天记忆LOGO" class="logo">
            <h1 class="site-name">春天记忆</h1>
            <p class="site-slogan">记录多彩人生，奔赴温热未来</p>
        </div>
    </header>

    <nav class="main-nav">
        <ul class="nav-list">
            <li><a href="index.html">首页</a></li>
            <li class="dropdown">
                <a href="about.html">个人中心 ▼</a>
                <ul class="dropdown-nav">
                    <li><a href="about.html">个人简介</a></li>
                    <li><a href="study.html">学习之旅</a></li>
                </ul>
            </li>
            <li><a href="hobby.html">兴趣爱好</a></li>
            <li><a href="travel.html">旅行见闻</a></li>
            <li><a href="future.html">未来规划</a></li>
            <li><a href="contact.html" class="active">留言互动</a></li>
        </ul>
    </nav>

    <div class="container-full">
        <main class="main-content">
            <h2 class="page-title">✉️ 访客留言互动</h2>
            <p class="page-desc">欢迎留下你的看法与建议，期待与你交流！</p>
            <div class="form-box">
                <!-- 表单：onsubmit触发JS表单验证，硬性考点 -->
                <form action="" method="get" onsubmit="return checkForm()">
                    <div class="form-item">
                        <label for="username">你的昵称：</label>
                        <input type="text" id="username" name="username" placeholder="请输入昵称">
                    </div>
                    <div class="form-item">
                        <label for="phone">手机号码：</label>
                        <input type="text" id="phone" name="phone" placeholder="请输入11位手机号">
                    </div>
                    <div class="form-item">
                        <label for="email">电子邮箱：</label>
                        <input type="text" id="email" name="email" placeholder="例：123@qq.com">
                    </div>
                    <div class="form-item">
                        <label for="msg">留言内容：</label>
                        <textarea id="msg" rows="5" placeholder="请输入你的留言..."></textarea>
                    </div>
                    <div class="form-item">
                        <input type="submit" value="提交留言" class="submit-btn">
                    </div>
                </form>
            </div>
        </main>
    </div>

    <footer class="footer">
        <p>©2025 春天记忆 版权所有 | 作者：韦忠江 学号：202522102121</p>

    </footer>
    <script src="js/script.js"></script>
</body>
</html>
